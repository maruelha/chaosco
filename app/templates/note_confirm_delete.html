{% extends "base.html" %}
{% block title %}Delete Note — {{ entity_label }} — Test Coordination{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Delete note?</h1>
  <p class="page-subtitle">{{ entity_label }}</p>
</div>

<div class="detail-card" style="max-width:600px">
  <p class="delete-warning">This cannot be undone.</p>

  {% if note.heading %}
  <p class="note-preview-heading">{{ note.heading }}</p>
  {% endif %}
  <p class="note-preview-text">{{ note.note or '(empty)' }}</p>

  <form method="post" action="{{ delete_url }}">
    <div class="btn-row" style="margin-top:1.5rem">
      <a href="{{ cancel_url }}" class="btn">Cancel</a>
      <button type="submit" class="btn btn-primary btn-delete">Delete note</button>
    </div>
  </form>
</div>
{% endblock %}
