{% extends "base.html" %}
{% block title %}Edit Note — {{ defect_id }} — Test Coordination{% endblock %}

{% block content %}
<nav class="breadcrumb">
  <a href="/">Dashboard</a>
  <span>›</span>
  <a href="/defects">Defects</a>
  <span>›</span>
  <a href="/defects/{{ defect_id }}">{{ defect_id }}</a>
  <span>›</span>
  <span>Edit note</span>
</nav>

<div class="page-header">
  <h1>Edit note</h1>
  <p class="page-subtitle">{{ defect_id }}</p>
</div>

<div class="annotation-card">
  <form method="post" action="/defects/{{ defect_id }}/notes/{{ note.id }}/edit">
    <div class="form-stack">

      <div class="form-field">
        <label for="f-heading">Heading <span class="field-hint">(optional)</span></label>
        <input id="f-heading" type="text" name="heading" value="{{ note.heading or '' }}" autofocus>
      </div>

      <div class="form-field">
        <label for="f-note">Note</label>
        <textarea id="f-note" name="note" rows="6">{{ note.note or '' }}</textarea>
      </div>

    </div>
    <div class="form-footer">
      <span class="last-edited">Created: {{ note.created_at }}</span>
      <div style="display:flex;gap:.5rem">
        <a href="/defects/{{ defect_id }}" class="btn">Cancel</a>
        <button type="submit" class="btn btn-primary">Save changes</button>
      </div>
    </div>
  </form>
</div>
{% endblock %}
