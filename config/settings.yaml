# chaosco – configuration
# Edit the values below to match your environment.
# For machine-specific overrides (e.g. a different downloads_folder),
# copy relevant keys to config/settings.local.yaml (gitignored).

# ---------------------------------------------------------------------------
# Step 1 — file location
# ---------------------------------------------------------------------------

downloads_folder: 'C:\AIProjectsSandbox\ClaudeProjekte\chaosco\Download'

# Base name of the file WITHOUT extension.
# Matches both  DTC_UAT_testtracking_ROE.xlsx
# and           DTC_UAT_testtracking_ROE(2).xlsx  (any trailing number in parentheses)
filename_stem: "DTC_UAT_testtracking_ROE"

# Which tabs/importers run on each import.
# Set enabled: false to skip a tab — existing data in the DB stays intact.
imports:
  defects:
    enabled: true
    sheet_name: "Defects"
  spillover:
    enabled: true
    sheet_name: "Core South Spillover"
  retail:
    enabled: true
    sheet_name: "Retail"
  ecom:
    enabled: true
    sheet_name: "ECOM"

# Defect statuses hidden from the default list view.
defects_hidden_statuses:
  - "Withdrawn"
  - "Confirmed"

# Spillover statuses hidden from the default list view.
spillover_hidden_statuses:
  - "Passed"
  - "Passed, pending solman"
  - "Passed pending Solman"
  - "Dropped"

# ---------------------------------------------------------------------------
# Step 2 — database + skip log
# ---------------------------------------------------------------------------

database_path: 'data/test_coordination.db'
skiplog_folder: 'output/skiplog'

# ---------------------------------------------------------------------------
# Step 3 — archiving
# ---------------------------------------------------------------------------

archive_enabled: true
archive_mode: "once_per_file"
archive_folder: 'archive'

# ---------------------------------------------------------------------------
# Step 4 — retail report Excel log
# ---------------------------------------------------------------------------

retail_report_xlsx: 'output/retail_report_log.xlsx'

# ---------------------------------------------------------------------------
# Step 5 — retail test case universe
# ---------------------------------------------------------------------------

retail_total_test_cases: 646

# ---------------------------------------------------------------------------
# Step 6 — SolMan defect status sync
# ---------------------------------------------------------------------------

solman_export_folder: 'C:\AIProjectsSandbox\ClaudeProjekte\chaosco\Download'
solman_export_stem: 'Data aggregated by Defect'
solman_export_sheet: 'SAP Document Export'

# ---------------------------------------------------------------------------
# Step 7 — report export folder
# ---------------------------------------------------------------------------

report_export_folder: 'report_export'

# ---------------------------------------------------------------------------
# Categories of test cases not yet imported into the tracker.
# ---------------------------------------------------------------------------

retail_missing_categories:
  - "Manual test cases"
  - "100% voucher cases"
  - "Event store"

# Retail Requirements Tracker — one-time import source (tabs 1-3 + tab 4)
retail_tracker_excel: 'report_export/TRACKING_Retail ROE UAT Testcases DTC (1).xlsx'

# Board scenario filter groups [USER 2026-07-09]: Excel scenario headings
# roll up into these; matched by substring, FIRST hit wins (till
# transactions before the "1. Retail Sale" batch that contains them).
# Unmatched headings land in "Other".
tracker_scenario_groups:
  "Till transactions": ["suspend", "retrieve", "cancellation"]
  "Different articles (first batch)": ["retail sale"]
  "Discounts": ["discount"]
  "General payment methods": ["payment method"]
  "B2B": ["b2b"]
  "PROMAT/FOC": ["promat", "foc"]

# ---------------------------------------------------------------------------
# Jira XML — ONE unified import [USER 2026-07-12]. Drop exports here (the
# NEWEST .xml wins, filenames don't matter). The Jira search may be broad,
# e.g. `assignee WAS currentUser()` + the board epics: tickets already
# tracked are refreshed; new ones enter only if assigned to me or on the
# ECOM board; the rest is ignored.
# ---------------------------------------------------------------------------

jira_folder: 'C:\AIProjectsSandbox\ClaudeProjekte\chaosco\Download\jira_gatekeeper'
# (jira_ecom_folder retired 2026-07-12 — one upload serves both boards)

# Entry sense check: new tickets are accepted when the Jira assignee
# CONTAINS this (case-insensitive).
jira_gatekeeper_assignee: 'Haase, Marina'

# Status value(s) meaning "handed to MB / in validation" — these tickets
# leave the gatekeeper working sections (they live on the ECOM board).
jira_validation_statuses:
  - 'In Validation'

# Email reports (GMX SMTP). Credentials belong ONLY in settings.local.yaml
# (gitignored) — never here:
#   email_user: 'you@gmx.de'
#   email_password: 'app-password'
#   email_smtp_host: 'mail.gmx.net'   # default
#   email_smtp_port: 587               # default
