# chaosco – configuration
# Edit the values below to match your environment.
# Use single quotes for Windows paths (backslashes are safe inside single quotes).

# ---------------------------------------------------------------------------
# Step 1 — file location
# ---------------------------------------------------------------------------

# Folder where the Excel export is manually saved
#laptop downloadfolder
#downloads_folder: #'C:\AIProjectsSandbox\ClaudeProjekte\chaosco\Download'
#desktop downloadfolder
#downloads_folder: 'E:\Downloads'
downloads_folder: 'C:\Users\Marina\Downloads'

# Base name of the file WITHOUT extension.
# Matches both  DTC_UAT_testtracking_ROE.xlsx
# and           DTC_UAT_testtracking_ROE(2).xlsx  (any trailing number in parentheses)
filename_stem: "DTC_UAT_testtracking_ROE"

# Which tabs/importers run on each import.
# Set enabled: false to skip a tab — existing data in the DB stays intact.
imports:
  defects:
    enabled: true
    sheet_name: "Defects"
  spillover:
    enabled: true
    sheet_name: "Core South Spillover"
  retail:
    enabled: true
    sheet_name: "Retail"

# Defect statuses hidden from the default list view.
# Override with the "Show all" toggle or by selecting a status explicitly.
defects_hidden_statuses:
  - "Withdrawn"
  - "Confirmed"

# Spillover statuses hidden from the default list view.
# Override with the "Show passed & dropped" toggle or by selecting one explicitly.
spillover_hidden_statuses:
  - "Passed"
  - "Passed, pending solman"
  - "Passed pending Solman"
  - "Dropped"

# ---------------------------------------------------------------------------
# Step 2 — database + skip log
# ---------------------------------------------------------------------------

# Path to the SQLite database (created on first run; relative to repo root or absolute)
database_path: 'data/test_coordination.db'

# Folder for per-run skip-log CSV files (one file per run where rows were skipped)
skiplog_folder: 'output/skiplog'

# ---------------------------------------------------------------------------
# Step 3 — archiving
# ---------------------------------------------------------------------------

# Set to false to disable archiving entirely (useful during testing)
archive_enabled: true

# "once_per_file" (default): archive only if the file content (SHA-256 hash) has not
#   been archived before. Repeated runs on the same download → archived once.
#   A fresh daily download → archived again as a new version.
# "always": archive on every run with a fresh timestamp.
archive_mode: "once_per_file"

# Folder where archived copies are stored
archive_folder: 'archive'

# ---------------------------------------------------------------------------
# Step 4 — retail report Excel log
# ---------------------------------------------------------------------------

# Each click of "Save to Excel" on the retail report page appends one row here.
# The file and a "Retail" sheet are created automatically on first use.
retail_report_xlsx: 'output/retail_report_log.xlsx'
