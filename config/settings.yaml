# chaosco – configuration
# Edit the values below to match your environment.
# For machine-specific overrides (e.g. a different downloads_folder),
# copy relevant keys to config/settings.local.yaml (gitignored).

# ---------------------------------------------------------------------------
# Step 1 — file location
# ---------------------------------------------------------------------------

downloads_folder: 'C:\AIProjectsSandbox\ClaudeProjekte\chaosco\Download'

# Base name of the file WITHOUT extension.
# Matches both  DTC_UAT_testtracking_ROE.xlsx
# and           DTC_UAT_testtracking_ROE(2).xlsx  (any trailing number in parentheses)
filename_stem: "DTC_UAT_testtracking_ROE"

# Which tabs/importers run on each import.
# Set enabled: false to skip a tab — existing data in the DB stays intact.
imports:
  defects:
    enabled: true
    sheet_name: "Defects"
  spillover:
    enabled: true
    sheet_name: "Core South Spillover"
  retail:
    enabled: true
    sheet_name: "Retail"
  ecom:
    enabled: true
    sheet_name: "ECOM"

# Defect statuses hidden from the default list view.
defects_hidden_statuses:
  - "Withdrawn"
  - "Confirmed"

# Spillover statuses hidden from the default list view.
spillover_hidden_statuses:
  - "Passed"
  - "Passed, pending solman"
  - "Passed pending Solman"
  - "Dropped"

# ---------------------------------------------------------------------------
# Step 2 — database + skip log
# ---------------------------------------------------------------------------

database_path: 'data/test_coordination.db'
skiplog_folder: 'output/skiplog'

# ---------------------------------------------------------------------------
# Step 3 — archiving
# ---------------------------------------------------------------------------

archive_enabled: true
archive_mode: "once_per_file"
archive_folder: 'archive'

# ---------------------------------------------------------------------------
# Step 4 — retail report Excel log
# ---------------------------------------------------------------------------

retail_report_xlsx: 'output/retail_report_log.xlsx'

# ---------------------------------------------------------------------------
# Step 5 — retail test case universe
# ---------------------------------------------------------------------------

retail_total_test_cases: 646

# ---------------------------------------------------------------------------
# Step 6 — SolMan defect status sync
# ---------------------------------------------------------------------------

solman_export_folder: 'C:\AIProjectsSandbox\ClaudeProjekte\chaosco\Download'
solman_export_stem: 'Data aggregated by Defect'
solman_export_sheet: 'SAP Document Export'

# ---------------------------------------------------------------------------
# Step 7 — report export folder
# ---------------------------------------------------------------------------

report_export_folder: 'report_export'

# ---------------------------------------------------------------------------
# Categories of test cases not yet imported into the tracker.
# ---------------------------------------------------------------------------

retail_missing_categories:
  - "Manual test cases"
  - "100% voucher cases"
  - "Event store"

# Retail Requirements Tracker — one-time import source (tabs 1-3 + tab 4)
retail_tracker_excel: 'report_export/TRACKING_Retail ROE UAT Testcases DTC (1).xlsx'

# ---------------------------------------------------------------------------
# Jira XML exports (ECOM Gatekeeper v2, day plan 05.07 step 2).
# Drop Jira XML exports here — the importer always takes the NEWEST .xml in
# each folder, filenames don't matter [USER 2026-07-06].
# ---------------------------------------------------------------------------

jira_gatekeeper_folder: 'C:\AIProjectsSandbox\ClaudeProjekte\chaosco\Download\jira_gatekeeper'
jira_ecom_folder: 'C:\AIProjectsSandbox\ClaudeProjekte\chaosco\Download\jira_ecom'

